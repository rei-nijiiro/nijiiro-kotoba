<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虹色のことば</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --red:    #E8604C;
    --orange: #F0956A;
    --yellow: #F5C842;
    --green:  #6BBF8E;
    --blue:   #5B9BD5;
    --indigo: #4A6FA5;
    --purple: #9B72B0;
    --bg: #FDFAF5;
    --text: #2C2416;
    --text-light: #8C7B6B;
    --accent: #5B9BD5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景装飾 */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(91,155,213,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(155,114,176,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 20%, rgba(107,191,142,0.05) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  /* ロゴ・タイトル */
  .logo {
    text-align: center;
    margin-bottom: 8px;
  }

  .logo-rainbow {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 16px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    animation: float 3s ease-in-out infinite;
  }
  .logo-dot:nth-child(1) { background: var(--red);    animation-delay: 0s; }
  .logo-dot:nth-child(2) { background: var(--orange); animation-delay: 0.2s; }
  .logo-dot:nth-child(3) { background: var(--yellow); animation-delay: 0.4s; }
  .logo-dot:nth-child(4) { background: var(--green);  animation-delay: 0.6s; }
  .logo-dot:nth-child(5) { background: var(--blue);   animation-delay: 0.8s; }
  .logo-dot:nth-child(6) { background: var(--indigo); animation-delay: 1.0s; }
  .logo-dot:nth-child(7) { background: var(--purple); animation-delay: 1.2s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .logo h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  .logo p {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-light);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* スクリーン */
  .screen {
    width: 100%;
    display: none;
    animation: fadeUp 0.6s ease forwards;
  }

  .screen.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 名前入力 */
  .name-section {
    text-align: center;
    margin-top: 40px;
  }

  .question-label {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 24px;
  }

  .question-sub {
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 0.1em;
    margin-bottom: 32px;
  }

  .name-input-wrap {
    position: relative;
    display: inline-block;
    width: 100%;
    max-width: 280px;
  }

  .name-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--text-light);
    padding: 12px 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 18px;
    color: var(--text);
    text-align: center;
    outline: none;
    letter-spacing: 0.2em;
    transition: border-color 0.3s;
  }

  .name-input:focus {
    border-bottom-color: var(--accent);
  }

  .name-input::placeholder {
    color: #ccc;
    font-size: 14px;
    letter-spacing: 0.1em;
  }

  /* ボタン */
  .btn {
    display: inline-block;
    margin-top: 32px;
    padding: 14px 40px;
    background: var(--text);
    color: var(--bg);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
  }

  .btn:hover {
    background: var(--accent);
    transform: translateY(-2px);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  /* 色選択 */
  .color-section {
    margin-top: 32px;
  }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 24px;
  }

  .color-btn {
    aspect-ratio: 1;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .color-btn:hover {
    transform: scale(1.15);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }

  .color-btn.selected {
    transform: scale(1.2);
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px currentColor;
  }

  .color-btn span {
    font-size: 10px;
    color: white;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  /* キーワード選択 */
  .keyword-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 24px;
  }

  .keyword-btn {
    width: 100%;
    padding: 16px 24px;
    background: white;
    border: 1.5px solid #E8E0D8;
    border-radius: 4px;
    font-family: 'Shippori Mincho', serif;
    font-size: 17px;
    letter-spacing: 0.15em;
    color: var(--text);
    cursor: pointer;
    transition: all 0.25s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .keyword-btn:hover {
    border-color: var(--selected-color, var(--accent));
    background: rgba(91,155,213,0.04);
    transform: translateX(4px);
  }

  .keyword-btn.selected {
    border-color: var(--selected-color, var(--accent));
    background: white;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .keyword-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--selected-color, var(--accent));
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .keyword-btn.selected .keyword-dot {
    opacity: 1;
  }

  /* 気持ち選択（3択） */
  .feeling-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 24px;
  }

  .feeling-btn {
    width: 100%;
    padding: 14px 20px;
    background: white;
    border: 1.5px solid #E8E0D8;
    border-radius: 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--text);
    cursor: pointer;
    transition: all 0.25s;
    text-align: left;
    line-height: 1.6;
  }

  .feeling-btn:hover, .feeling-btn.selected {
    border-color: var(--selected-color, var(--accent));
    background: rgba(91,155,213,0.04);
  }

  /* ナラティブ表示 */
  .narrative-section {
    margin-top: 16px;
  }

  .narrative-card {
    background: white;
    border-radius: 8px;
    padding: 32px 28px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
  }

  .narrative-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow), var(--green), var(--blue), var(--indigo), var(--purple));
  }

  .narrative-color-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: white;
  }

  .narrative-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    color: var(--text-light);
    letter-spacing: 0.2em;
    margin-bottom: 16px;
  }

  .narrative-text {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    line-height: 2.2;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .narrative-keyword {
    display: inline-block;
    font-weight: 600;
    position: relative;
  }

  .narrative-keyword::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--selected-color, var(--accent));
    opacity: 0.5;
  }

  .narrative-en {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--text-light);
    margin-top: 20px;
    font-style: italic;
  }

  /* プログレス */
  .progress {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #DDD;
    transition: all 0.3s;
  }

  .progress-dot.active {
    background: var(--selected-color, var(--accent));
    width: 20px;
    border-radius: 3px;
  }

  .progress-dot.done {
    background: var(--selected-color, var(--accent));
    opacity: 0.4;
  }

  /* ラッキーアイテム */
  .lucky-box {
    margin-top: 20px;
    padding: 16px 20px;
    background: white;
    border-radius: 6px;
    border: 1px dashed var(--selected-color, var(--accent));
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .lucky-icon {
    font-size: 28px;
    flex-shrink: 0;
  }

  .lucky-content {}

  .lucky-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-light);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .lucky-item {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.1em;
  }

  .lucky-reason {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 3px;
    line-height: 1.6;
  }

  /* CTA */
  .cta-box {
    margin-top: 24px;
    padding: 20px;
    background: linear-gradient(135deg, #F8F4EE, #FDFAF5);
    border: 1px solid #E8E0D8;
    border-radius: 6px;
    text-align: center;
  }

  .cta-box p {
    font-size: 13px;
    color: var(--text-light);
    line-height: 1.8;
    letter-spacing: 0.05em;
  }

  .cta-box strong {
    color: var(--text);
    font-family: 'Shippori Mincho', serif;
  }

  .btn-outline {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 28px;
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
  }

  .btn-outline:hover {
    background: var(--text);
    color: var(--bg);
  }

  .btn-retry {
    display: inline-block;
    margin-top: 12px;
    padding: 8px 20px;
    background: transparent;
    color: var(--text-light);
    border: 1px solid #DDD;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
  }

  .btn-retry:hover { border-color: var(--text-light); color: var(--text); }

  /* ローディング */
  .loading {
    text-align: center;
    padding: 40px;
    display: none;
  }

  .loading.active { display: block; }

  .loading-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .loading-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .loading-dot:nth-child(1) { background: var(--selected-color, var(--blue)); animation-delay: 0s; }
  .loading-dot:nth-child(2) { background: var(--selected-color, var(--blue)); animation-delay: 0.2s; opacity: 0.7; }
  .loading-dot:nth-child(3) { background: var(--selected-color, var(--blue)); animation-delay: 0.4s; opacity: 0.4; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.5); }
  }

  .loading p {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    color: var(--text-light);
    letter-spacing: 0.2em;
  }
</style>
</head>
<body>
<div class="app">

  <!-- ロゴ -->
  <div class="logo">
    <div class="logo-rainbow">
      <div class="logo-dot"></div>
      <div class="logo-dot"></div>
      <div class="logo-dot"></div>
      <div class="logo-dot"></div>
      <div class="logo-dot"></div>
      <div class="logo-dot"></div>
      <div class="logo-dot"></div>
    </div>
    <h1>虹色のことば</h1>
    <p>Nijiiro Kotoba</p>
  </div>

  <!-- STEP 0: 名前入力 -->
  <div class="screen active" id="screen-name">
    <div class="name-section">
      <p class="question-label">あなたの名前を<br>教えてください</p>
      <p class="question-sub">— your name —</p>
      <div class="name-input-wrap">
        <input class="name-input" type="text" id="nameInput" placeholder="例）れい" maxlength="10">
      </div>
      <br>
      <button class="btn" id="nameBtn" onclick="goToColor()" disabled>はじめる</button>
    </div>
  </div>

  <!-- STEP 1: 色選択 -->
  <div class="screen" id="screen-color">
    <div class="progress">
      <div class="progress-dot active" id="p1"></div>
      <div class="progress-dot" id="p2"></div>
      <div class="progress-dot" id="p3"></div>
    </div>
    <p class="question-label">今の直感で選ぶと、<br>何色ですか？</p>
    <p class="question-sub">— choose your color —</p>
    <div class="color-grid" id="colorGrid">
      <button class="color-btn" style="background:#E8604C;color:#E8604C" onclick="selectColor('red','赤','#E8604C',['静寂','情熱','勇気'])" title="赤">
        <span>赤</span>
      </button>
      <button class="color-btn" style="background:#F0956A" onclick="selectColor('orange','橙','#F0956A',['温もり','創造','活力'])" title="橙">
        <span>橙</span>
      </button>
      <button class="color-btn" style="background:#F5C842" onclick="selectColor('yellow','黄','#F5C842',['喜び','知性','希望'])" title="黄">
        <span>黄</span>
      </button>
      <button class="color-btn" style="background:#6BBF8E" onclick="selectColor('green','緑','#6BBF8E',['調和','成長','癒し'])" title="緑">
        <span>緑</span>
      </button>
      <button class="color-btn" style="background:#5B9BD5" onclick="selectColor('blue','青','#5B9BD5',['静寂','慈悲','表現'])" title="青">
        <span>青</span>
      </button>
      <button class="color-btn" style="background:#4A6FA5" onclick="selectColor('indigo','藍','#4A6FA5',['直感','洞察','深化'])" title="藍">
        <span>藍</span>
      </button>
      <button class="color-btn" style="background:#9B72B0" onclick="selectColor('purple','紫','#9B72B0',['霊性','変容','高貴'])" title="紫">
        <span>紫</span>
      </button>
    </div>
  </div>

  <!-- STEP 2: キーワード選択 -->
  <div class="screen" id="screen-keyword">
    <div class="progress">
      <div class="progress-dot done" id="p1b"></div>
      <div class="progress-dot active" id="p2b"></div>
      <div class="progress-dot" id="p3b"></div>
    </div>
    <p class="question-label" id="keywordQuestion">直感でひとつ<br>選んでください</p>
    <p class="question-sub">— choose your word —</p>
    <div class="keyword-grid" id="keywordGrid"></div>
  </div>

  <!-- STEP 3: 気持ち選択 -->
  <div class="screen" id="screen-feeling">
    <div class="progress">
      <div class="progress-dot done"></div>
      <div class="progress-dot done"></div>
      <div class="progress-dot active"></div>
    </div>
    <p class="question-label" id="feelingQuestion">今のあなたに<br>近いのはどれですか？</p>
    <p class="question-sub">— how do you feel —</p>
    <div class="feeling-grid" id="feelingGrid"></div>
  </div>

  <!-- ローディング -->
  <div class="loading" id="loading">
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
    <p>ことばを紡いでいます…</p>
  </div>

  <!-- STEP 4: ナラティブ -->
  <div class="screen" id="screen-narrative">
    <div class="narrative-section">
      <div class="narrative-card" id="narrativeCard">
        <span class="narrative-color-badge" id="narrativeBadge">● 青</span>
        <p class="narrative-name" id="narrativeName">— for れい —</p>
        <p class="narrative-text" id="narrativeText"></p>
        <p class="narrative-en" id="narrativeEn"></p>
        <div class="lucky-box" id="luckyBox">
          <div class="lucky-icon" id="luckyIcon">🌿</div>
          <div class="lucky-content">
            <p class="lucky-label">Lucky Item</p>
            <p class="lucky-item" id="luckyItem">ラッキーアイテム</p>
            <p class="lucky-reason" id="luckyReason"></p>
          </div>
        </div>
      </div>
      <div class="cta-box">
        <p>このことばをもっと深く探りたい方へ。<br>
        <strong>虹色のことば　カラーレッスン</strong>では<br>
        あなただけのナラティブを丁寧に紡ぎます。</p>
        <button class="btn-outline">カラーレッスンを見る →</button>
        <br>
        <button class="btn-retry" onclick="restart()">もう一度試す</button>
      </div>
    </div>
  </div>

</div>

<script>
const state = {
  name: '',
  color: '',
  colorName: '',
  colorHex: '',
  keyword: '',
  feeling: ''
};

// ナラティブデータ（事前生成）
const narratives = {
  blue: {
    静寂: {
      a: { text: "静かな水面のように、あなたの内側はいつも多くを映しています。今日あなたが選んだ「静寂」は、逃げ場ではなく、還る場所。ざわめきの向こうに、あなたの声が待っています。", en: "Your stillness is not emptiness — it is everything." },
      b: { text: "「もっと声に出してもいいのに」と思われているかもしれません。でも、あなたの静かさは強さ。今日は少しだけ、その静けさに自分を委ねてみて。", en: "In your silence, a strength no one else can hold." },
      c: { text: "静寂の中にいるとき、あなたは最もあなたです。その場所から、一つだけ言葉を持って出てきてください。それがきっと、誰かに届く言葉になります。", en: "From silence, the truest words are born." }
    },
    慈悲: {
      a: { text: "誰かのために心を砕ける人は、自分にも同じ優しさを向けていいのです。今日の「慈悲」は、まず、あなた自身への贈り物として受け取ってください。", en: "You deserve the same kindness you give to others." },
      b: { text: "あなたの慈悲は涸れません。でも、泉も少しずつ満たす時間が必要です。今日は自分を満たすことを、遠慮なく選んでいい日です。", en: "Fill your own cup first." },
      c: { text: "「慈悲」を選んだあなたは、すでに誰かの光になっています。それを知らずにいるのが、あなたらしいところ。今日は鏡の前で、自分に微笑んでみて。", en: "You are already someone's light." }
    },
    表現: {
      a: { text: "まだ言葉にならない何かが、あなたの中でゆっくり形を作っています。焦らなくていい。それが完成したとき、世界が少し変わります。あなたの声で。", en: "Your expression changes the world, one word at a time." },
      b: { text: "「うまく伝えられないな」と感じることがあっても、あなたが伝えようとする姿そのものが、すでに誰かの心を動かしています。", en: "The attempt itself is already beautiful." },
      c: { text: "表現とは、完璧な言葉を見つけることではありません。今のあなたの形で、今のあなたの声で。それが虹色のことばです。", en: "Express yourself — exactly as you are, right now." }

document.getElementById('nameInput').addEventListener('input', function() {
  document.getElementById('nameBtn').disabled = this.value.trim() === '';
});

document.getElementById('nameInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter' && this.value.trim()) goToColor();
});

function goToColor() {
  state.name = document.getElementById('nameInput').value.trim();
  showScreen('screen-color');
}

function selectColor(colorKey, colorName, colorHex, keywords) {
  state.color = colorKey;
  state.colorName = colorName;
  state.colorHex = colorHex;

  document.documentElement.style.setProperty('--selected-color', colorHex);

  // キーワードリスト構築
  const grid = document.getElementById('keywordGrid');
  grid.innerHTML = '';
  keywords.forEach(kw => {
    const btn = document.createElement('button');
    btn.className = 'keyword-btn';
    btn.innerHTML = `<span class="keyword-dot"></span>${kw}`;
    btn.onclick = () => selectKeyword(kw, btn);
    grid.appendChild(btn);
  });

  document.getElementById('keywordQuestion').textContent = `${colorName}のキーワードから\n直感でひとつ選んでください`;

  setTimeout(() => showScreen('screen-keyword'), 300);
}

function selectKeyword(kw, btn) {
  document.querySelectorAll('.keyword-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.keyword = kw;

  // 気持ち選択肢
  const options = feelingOptions[kw] || ['今はほっとしたい', '前に進みたい', '自分を見つめたい'];
  const grid = document.getElementById('feelingGrid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const fbtn = document.createElement('button');
    fbtn.className = 'feeling-btn';
    fbtn.textContent = opt;
    fbtn.onclick = () => selectFeeling(opt, fbtn);
    grid.appendChild(fbtn);
  });

  document.getElementById('feelingQuestion').textContent = `今のあなたに\n近いのはどれですか？`;

  setTimeout(() => showScreen('screen-feeling'), 400);
}

function selectFeeling(feeling, btn) {
  document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.feeling = feeling;

  setTimeout(() => showNarrative(), 500);
}

function showNarrative() {
  showScreen(null);
  document.getElementById('loading').classList.add('active');

  setTimeout(() => {
    document.getElementById('loading').classList.remove('active');

    const colorData = narratives[state.color];
    const kwData = colorData ? colorData[state.keyword] : null;

    let narrative;
    if (kwData) {
      const keys = Object.keys(kwData);
      // 気持ちのインデックスでパターン選択
      const feelIdx = document.querySelectorAll('.feeling-btn');
      let idx = 0;
      feelIdx.forEach((b, i) => { if (b.classList.contains('selected')) idx = i; });
      const key = keys[idx % keys.length];
      narrative = kwData[key];
    } else {
      narrative = {
        text: `${state.name}さん、あなたが選んだ「${state.keyword}」ということばは、今のあなたに必要なメッセージを持っています。その感覚を大切に、今日を過ごしてください。`,
        en: "Trust the word you chose today."
      };
    }

    const badge = document.getElementById('narrativeBadge');
    badge.style.background = state.colorHex;
    badge.textContent = `● ${state.colorName}`;

    document.getElementById('narrativeName').textContent = `— for ${state.name} —`;

    const textEl = document.getElementById('narrativeText');
    const kwSpan = `<span class="narrative-keyword">${state.keyword}</span>`;
    textEl.innerHTML = narrative.text.replace(new RegExp(`「${state.keyword}」`, 'g'), `「${kwSpan}」`);

    document.getElementById('narrativeEn').textContent = narrative.en;

    // ラッキーアイテム
    const items = luckyItems[state.color] || luckyItems.green;
    const lucky = items[Math.floor(Math.random() * items.length)];
    document.getElementById('luckyIcon').textContent = lucky.icon;
    document.getElementById('luckyItem').textContent = lucky.item;
    document.getElementById('luckyReason').textContent = lucky.reason;
    document.getElementById('luckyBox').style.setProperty('--selected-color', state.colorHex);

    showScreen('screen-narrative');
  }, 1800);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.add('active');
      el.style.animation = 'none';
      requestAnimationFrame(() => { el.style.animation = ''; });
    }
  }
}

function restart() {
  state.color = '';
  state.colorName = '';
  state.colorHex = '';
  state.keyword = '';
  state.feeling = '';
  document.documentElement.style.setProperty('--selected-color', '#5B9BD5');
  showScreen('screen-name');
}
